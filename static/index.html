<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成语接龙（RAG版）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .header {
            background: #4a6cf7;
            color: white;
            padding: 25px;
            text-align: center;
        }
        .header h1 {
            font-size: 2.2em;
            margin-bottom: 8px;
        }
        .header p {
            font-size: 1em;
            opacity: 0.9;
        }
        .tab-container {
            display: flex;
            background: #f5f5f5;
            border-bottom: 1px solid #ddd;
        }
        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        .tab.active {
            background: white;
            color: #4a6cf7;
            border-bottom: 3px solid #4a6cf7;
        }
        .tab:hover {
            background: #e8e8e8;
        }
        .content {
            padding: 30px;
            display: none;
        }
        .content.active {
            display: block;
        }
        .game-area {
            text-align: center;
        }
        .start-btn {
            background: #4a6cf7;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1.1em;
            cursor: pointer;
            margin: 15px 0;
            transition: all 0.3s;
        }
        .start-btn:hover {
            background: #3a5ce7;
            transform: translateY(-2px);
        }
        .idiom-list {
            margin: 20px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            min-height: 100px;
        }
        .idiom-item {
            display: inline-block;
            background: #e3f2fd;
            padding: 10px 15px;
            border-radius: 8px;
            margin: 5px;
            font-size: 1.2em;
            font-weight: bold;
        }
        .input-area {
            margin: 20px 0;
        }
        .input-area input {
            padding: 12px 20px;
            width: 60%;
            border: 2px solid #ddd;
            border-radius: 25px;
            font-size: 1.1em;
            outline: none;
            transition: all 0.3s;
        }
        .input-area input:focus {
            border-color: #4a6cf7;
        }
        .input-area button {
            background: #4a6cf7;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 1.1em;
            cursor: pointer;
            margin-left: 10px;
            transition: all 0.3s;
        }
        .input-area button:hover {
            background: #3a5ce7;
        }
        .message {
            margin: 15px 0;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
        }
        .vs-history {
            margin: 20px 0;
            text-align: left;
        }
        .vs-item {
            padding: 10px;
            margin: 5px 0;
            border-radius: 8px;
        }
        .vs-item.user {
            background: #e3f2fd;
            text-align: right;
        }
        .vs-item.ai {
            background: #f3e5f5;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 成语接龙（RAG版）</h1>
            <p>基于成语文档检索 · 本地大模型驱动</p>
        </div>

        <div class="tab-container">
            <div class="tab active" data-tab="auto">🤖 AI自动接龙</div>
            <div class="tab" data-tab="vs">🎮 玩家VS AI</div>
            <div class="tab" data-tab="quiz">📝 玩家出题AI对</div>
        </div>

        <!-- 标签1：AI自动接龙 -->
        <div class="content active" id="auto">
            <div class="game-area">
                <button class="start-btn" onclick="startAutoPlay()">开始AI自动接龙</button>
                <div class="idiom-list" id="auto-list"></div>
            </div>
        </div>

        <!-- 标签2：玩家VS AI -->
        <div class="content" id="vs">
            <div class="game-area">
                <button class="start-btn" onclick="startVsGame()">开始对战</button>
                <div class="message" id="vs-message"></div>
                <div class="vs-history" id="vs-history"></div>
                <div class="input-area" id="vs-input" style="display: none;">
                    <input type="text" id="vs-user-input" placeholder="请输入你要接的成语">
                    <button onclick="submitVs()">提交</button>
                </div>
            </div>
        </div>

        <!-- 标签3：玩家出题AI对 -->
        <div class="content" id="quiz">
            <div class="game-area">
                <div class="input-area">
                    <input type="text" id="quiz-user-input" placeholder="请输入你出的成语">
                    <button onclick="submitQuiz()">让AI接龙</button>
                </div>
                <div class="message" id="quiz-message"></div>
                <div class="idiom-list" id="quiz-list"></div>
            </div>
        </div>
    </div>

    <script>
        // 标签切换
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab).classList.add('active');
            });
        });

        // ================== AI自动接龙 ==================
        async function startAutoPlay() {
            const listEl = document.getElementById('auto-list');
            listEl.innerHTML = '<div class="idiom-item">AI正在接龙中...</div>';
            const res = await fetch('/api/ai_auto_play?rounds=10');
            const data = await res.json();
            listEl.innerHTML = '';
            data.result.forEach(idiom => {
                const item = document.createElement('div');
                item.className = 'idiom-item';
                item.textContent = idiom;
                listEl.appendChild(item);
            });
        }

        // ================== 玩家VS AI ==================
        let vsCurrentIdiom = '';
        async function startVsGame() {
            const res = await fetch('/api/random_start');
            const data = await res.json();
            vsCurrentIdiom = data.start;
            document.getElementById('vs-message').innerHTML = `<div class="message success">游戏开始！起始成语：${vsCurrentIdiom}</div>`;
            document.getElementById('vs-history').innerHTML = `<div class="vs-item ai">🤖 AI：${vsCurrentIdiom}</div>`;
            document.getElementById('vs-input').style.display = 'block';
            document.getElementById('vs-user-input').value = '';
            document.getElementById('vs-user-input').focus();
        }

        async function submitVs() {
            const userInput = document.getElementById('vs-user-input').value.trim();
            if (!userInput) return;
            const res = await fetch(`/api/vs_check?user_idiom=${userInput}&current_idiom=${vsCurrentIdiom}`);
            const data = await res.json();
            const historyEl = document.getElementById('vs-history');
            const messageEl = document.getElementById('vs-message');

            if (data.status === 'error') {
                messageEl.innerHTML = `<div class="message error">${data.message}</div>`;
                document.getElementById('vs-input').style.display = 'none';
                return;
            }

            // 玩家回合
            historyEl.innerHTML += `<div class="vs-item user">👤 你：${data.user_idiom}</div>`;
            vsCurrentIdiom = data.user_idiom;

            // AI回合
            if (!data.ai_idiom) {
                messageEl.innerHTML = `<div class="message success">${data.message}</div>`;
                document.getElementById('vs-input').style.display = 'none';
                return;
            }

            historyEl.innerHTML += `<div class="vs-item ai">🤖 AI：${data.ai_idiom}</div>`;
            vsCurrentIdiom = data.ai_idiom;
            messageEl.innerHTML = `<div class="message success">AI接龙成功！请继续接：${vsCurrentIdiom}</div>`;
            document.getElementById('vs-user-input').value = '';
            document.getElementById('vs-user-input').focus();
        }

        // ================== 玩家出题AI对 ==================
        async function submitQuiz() {
            const userInput = document.getElementById('quiz-user-input').value.trim();
            if (!userInput) return;
            const res = await fetch(`/api/ai_reply?user_idiom=${userInput}`);
            const data = await res.json();
            const messageEl = document.getElementById('quiz-message');
            const listEl = document.getElementById('quiz-list');

            if (data.status === 'error') {
                messageEl.innerHTML = `<div class="message error">${data.message}</div>`;
                listEl.innerHTML = '';
                return;
            }

            if (!data.ai_idiom) {
                messageEl.innerHTML = `<div class="message success">${data.message}</div>`;
                listEl.innerHTML = `<div class="idiom-item">${userInput}</div>`;
                return;
            }

            messageEl.innerHTML = `<div class="message success">AI接龙成功！</div>`;
            listEl.innerHTML = `<div class="idiom-item">${userInput}</div><div class="idiom-item">${data.ai_idiom}</div>`;
        }
    </script>
</body>
</html>
